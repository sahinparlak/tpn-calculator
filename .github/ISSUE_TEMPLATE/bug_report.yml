name: Bug report
description: Report a defect in the engine, tooling, or docs.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ If this is an **incorrect or unsafe clinical calculation**, please do not
        file it here — report it privately via [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the patient input and the profile used, if relevant.
      placeholder: |
        1. Patient input: ...
        2. Profile: ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What did you expect, and what did you get?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, package version/commit.
    validations:
      required: false
